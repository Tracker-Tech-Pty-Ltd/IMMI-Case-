name = "immi-case"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# ────────────────────────────────────────────────────────────────────────────
# Required Cloudflare Worker secrets (US-015)
# ────────────────────────────────────────────────────────────────────────────
# These secrets are NOT declared here (wrangler does not allow secret values
# in wrangler.toml). They MUST be set per-environment via:
#     npx wrangler secret put <NAME> --name immi-case
# scripts/preflight_secrets.sh asserts each is bound BEFORE `wrangler deploy`
# runs in CI, so the iteration-12 failure mode (deploy succeeds, runtime
# 500 because CSRF_SECRET was never bound) cannot recur.
#
#   CSRF_SECRET                HMAC key for double-submit CSRF token
#   ANTHROPIC_API_KEY          Claude moderator + expert
#   GEMINI_API_KEY             Gemini Pro / Flash expert + moderator fallback
#   OPENAI_API_KEY             gpt-5-mini expert
#   CF_AIG_TOKEN               Cloudflare AI Gateway routing token
#   HYPERDRIVE_DATABASE_URL    fallback DB URL when env.HYPERDRIVE binding misses
# ────────────────────────────────────────────────────────────────────────────

# Read path: Worker handles GET /api/v1/{cases,stats,filter-options} natively via Hyperdrive → Supabase PostgreSQL.
# Write path: POST/PUT/DELETE and complex analytics are proxied to the Flask Container.
# React SPA at /app/* is also served via the Flask Container.
main = "workers/proxy.js"

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "c961b377ef0c4ec2a01d9d7220db7c93"
# To create Hyperdrive, use the DIRECT connection (not Supabase pooler):
#   npx wrangler hyperdrive create immi-case-db \
#     --connection-string="postgresql://postgres:[DB_PASSWORD]@db.urntbuqczarkuoaosjxd.supabase.co:5432/postgres"
#
# DB password: Supabase Dashboard → Project Settings → Database → "Database password"
# ⚠️  Use host db.[PROJECT_REF].supabase.co (direct), NOT the pooler host
# ⚠️  Username is postgres (plain), NOT postgres.[PROJECT_REF]
#
# After creation, replace the id above with the returned Hyperdrive ID.
# The Worker (proxy.js) injects env.HYPERDRIVE.connectionString as X-Hyperdrive-Url header
# so the Flask container can use it for direct psycopg2 connections (analytics fast path).
localConnectionString = "postgresql://postgres:postgres@localhost:5432/immi_case"

[durable_objects]
bindings = [
  { name = "FlaskBackend", class_name = "FlaskBackend" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["FlaskBackend"]

[[routes]]
pattern = "immi.trackit.today"
custom_domain = true

[[containers]]
class_name = "FlaskBackend"
image = "./Dockerfile"
# Bumped 2→3 to allow rolling DO instance bumps (flask-v13/v14/v15) without
# quota lockout when forcing cold-start to pick up new container images.
max_instances = 3

# Per .omc/plans/hyperdrive-full-migration.md §Phase 1 #9 streaming export.
# 30s CPU cap is too tight for 50K-row cursor batches; bump to 60s. Network
# wall-time on streamed responses is unbounded (Cloudflare exception).
[limits]
cpu_ms = 60000

# Per plan REVISION 1 §M6: when Phase 4 retires Flask, the Python
# @rate_limit decorators (web/security.py) are gone — Worker writes need
# their own throttle. Bindings register here; handler code wires them in
# a follow-up commit so this addition is inert until env.RL_* is read.
[[unsafe.bindings]]
name = "RL_CASES_CREATE"
type = "ratelimit"
namespace_id = "1100"
simple = { limit = 30, period = 60 }

[[unsafe.bindings]]
name = "RL_CASES_BATCH"
type = "ratelimit"
namespace_id = "1101"
simple = { limit = 10, period = 60 }

[[unsafe.bindings]]
name = "RL_COLLECTIONS_EXPORT"
type = "ratelimit"
namespace_id = "1102"
simple = { limit = 10, period = 60 }

[[unsafe.bindings]]
name = "RL_GUIDED_SEARCH"
type = "ratelimit"
namespace_id = "1103"
simple = { limit = 30, period = 60 }

# LLM Council per-IP rate limit — prevents runaway cost when an attacker
# (or buggy client) loops through `/api/v1/llm-council/sessions` and
# `/sessions/:id/turns`. 30 turns/min is generous for legitimate users
# (a real conversation rarely exceeds 1 turn / 5s).
[[unsafe.bindings]]
name = "RL_COUNCIL_TURN"
type = "ratelimit"
namespace_id = "1104"
simple = { limit = 30, period = 60 }
