name = "immi-case"
compatibility_date = "2025-01-01"

# Cloudflare Pages handles the React SPA static files.
# This Worker proxies API calls to the Flask Container.
main = "workers/proxy.js"

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "REPLACE_WITH_YOUR_HYPERDRIVE_ID"
# Run `npx wrangler hyperdrive create immi-case-db --connection-string="postgresql://..."` to get ID
# Local dev: point to local Postgres or Supabase
localConnectionString = "postgresql://postgres:postgres@localhost:5432/immi_case"

[[containers]]
class_name = "FlaskBackend"
image = "./Dockerfile"
max_instances = 2
