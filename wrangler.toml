name = "immi-case"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# Read path: Worker handles GET /api/v1/{cases,stats,filter-options} natively via Hyperdrive → Supabase PostgreSQL.
# Write path: POST/PUT/DELETE and complex analytics are proxied to the Flask Container.
# React SPA at /app/* is also served via the Flask Container.
main = "workers/proxy.js"

[[hyperdrive]]
binding = "HYPERDRIVE"
id = "c961b377ef0c4ec2a01d9d7220db7c93"
# To create Hyperdrive, use the DIRECT connection (not Supabase pooler):
#   npx wrangler hyperdrive create immi-case-db \
#     --connection-string="postgresql://postgres:[DB_PASSWORD]@db.urntbuqczarkuoaosjxd.supabase.co:5432/postgres"
#
# DB password: Supabase Dashboard → Project Settings → Database → "Database password"
# ⚠️  Use host db.[PROJECT_REF].supabase.co (direct), NOT the pooler host
# ⚠️  Username is postgres (plain), NOT postgres.[PROJECT_REF]
#
# After creation, replace the id above with the returned Hyperdrive ID.
# The Worker (proxy.js) injects env.HYPERDRIVE.connectionString as X-Hyperdrive-Url header
# so the Flask container can use it for direct psycopg2 connections (analytics fast path).
localConnectionString = "postgresql://postgres:postgres@localhost:5432/immi_case"

[durable_objects]
bindings = [
  { name = "FlaskBackend", class_name = "FlaskBackend" }
]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["FlaskBackend"]

[[routes]]
pattern = "immi.trackit.today"
custom_domain = true

[[containers]]
class_name = "FlaskBackend"
image = "./Dockerfile"
max_instances = 2
