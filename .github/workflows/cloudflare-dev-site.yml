name: Cloudflare Dev Site

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/cloudflare-dev-site.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-dev-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: "frontend/package-lock.json"

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps
        working-directory: frontend

      - name: Build frontend for Cloudflare Pages
        run: npm run build:cloudflare
        working-directory: frontend

      - name: Update API_ORIGIN secret on Pages project
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          IMMI_API_ORIGIN: ${{ secrets.IMMI_API_ORIGIN }}
        run: |
          if [ -z "${IMMI_API_ORIGIN}" ]; then
            echo "Missing required GitHub secret: IMMI_API_ORIGIN"
            exit 1
          fi
          printf "%s" "${IMMI_API_ORIGIN}" | npx wrangler pages secret put API_ORIGIN --project-name immi-case-dev

      - name: Deploy to Cloudflare Pages (development alias)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy frontend/dist --project-name immi-case-dev
