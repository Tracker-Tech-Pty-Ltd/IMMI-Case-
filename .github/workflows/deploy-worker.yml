name: Deploy Worker (Cloudflare Containers + Hyperdrive)

on:
  push:
    branches: [main]
    paths:
      - "workers/**"
      - "Dockerfile"
      - "wrangler.toml"
      - "immi_case_downloader/**"
      - "requirements.txt"
      - "web.py"
      - ".github/workflows/deploy-worker.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"

      - name: Install Worker dependencies
        run: npm ci

      # US-015: fail fast if any required Worker secret is missing on the
      # remote Worker before we attempt to deploy. iteration 12 shipped
      # without CSRF_SECRET bound, causing /api/v1/csrf-token + write
      # endpoints to 500 until secret was added post-deploy.
      - name: Preflight — verify required Worker secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: bash scripts/preflight_secrets.sh

      - name: Deploy Worker + Flask Container + Hyperdrive
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

